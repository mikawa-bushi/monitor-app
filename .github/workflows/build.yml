name: Build

on:
  push:
    branches: [ 'main' ]  # Only main branch
    tags: [ 'v*' ]        # Version tags (v2.1.0, v2.2.0, etc.)
  release:
    types: [published]    # When a release is published

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Build package
      run: poetry build

    - name: Check package metadata
      run: |
        pip install twine
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ github.sha }}
        path: dist/
        retention-days: 30

  # PyPI publishing via Trusted Publishing (OIDC) — no API token stored in secrets.
  # Setup (one time): on PyPI, project "monitor-app" → Publishing → add GitHub
  # publisher (owner: mikawa-bushi, repo: monitor-app, workflow: build.yml,
  # environment: pypi). Then create a GitHub environment named "pypi".
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/monitor-app/
    permissions:
      id-token: write  # Required for Trusted Publishing

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-${{ github.sha }}
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
